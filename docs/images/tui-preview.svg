<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400" role="img" aria-label="Claude StatusLine Widgets — TUI Configurator">
  <title>Claude StatusLine Widgets — TUI Configurator</title>

  <!-- Window background -->
  <rect width="660" height="400" rx="10" fill="#1e1e2e"/>
  <!-- Title bar -->
  <rect width="660" height="36" rx="10" fill="#313244"/>
  <rect y="26" width="660" height="10" fill="#313244"/>
  <!-- Window control dots -->
  <circle cx="16" cy="18" r="5" fill="#f38ba8"/>
  <circle cx="32" cy="18" r="5" fill="#f9e2af"/>
  <circle cx="48" cy="18" r="5" fill="#a6e3a1"/>
  <!-- Title -->
  <text x="330" y="22.5" text-anchor="middle" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#585b70">ccfooter-config</text>

  <!-- App title -->
  <text x="20" y="66" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="13" font-weight="bold" fill="#cba6f7">Claude StatusLine Widget Configurator</text>
  <line x1="20" y1="74" x2="640" y2="74" stroke="#313244" stroke-width="1"/>

  <!-- Left pane: Main Menu -->
  <text x="20" y="96" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#585b70">Main Menu</text>

  <!-- Menu items -->
  <!-- Selected item highlight -->
  <rect x="16" y="102" width="200" height="18" rx="3" fill="#313244"/>
  <text x="24" y="115" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="13" fill="#a6e3a1">❯ Edit Line 1</text>

  <text x="24" y="137" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="13" fill="#cdd6f4">  Edit Line 2</text>
  <text x="24" y="159" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="13" fill="#cdd6f4">  Edit Line 3</text>
  <text x="24" y="181" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="13" fill="#cdd6f4">  Add New Line</text>
  <text x="24" y="203" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="13" fill="#cdd6f4">  Reset to Defaults</text>
  <text x="24" y="225" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="13" fill="#585b70">  Quit</text>

  <!-- Right pane: Line 1 editor -->
  <line x1="230" y1="80" x2="230" y2="340" stroke="#313244" stroke-width="1"/>
  <text x="246" y="96" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#585b70">Line 1 — Widgets</text>

  <!-- Widget chips for line 1 -->
  <!-- path -->
  <rect x="244" y="102" width="48" height="18" rx="3" fill="#45475a"/>
  <text x="268" y="115" text-anchor="middle" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#cdd6f4">path</text>
  <!-- | -->
  <text x="298" y="115" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#585b70"> | </text>
  <!-- branch -->
  <rect x="312" y="102" width="58" height="18" rx="3" fill="#45475a"/>
  <text x="341" y="115" text-anchor="middle" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#cdd6f4">branch</text>
  <!-- | -->
  <text x="376" y="115" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#585b70"> | </text>
  <!-- model - selected -->
  <rect x="390" y="102" width="56" height="18" rx="3" fill="#7f849c"/>
  <text x="418" y="115" text-anchor="middle" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#1e1e2e" font-weight="bold">model</text>
  <!-- | -->
  <text x="451" y="115" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#585b70"> | </text>
  <!-- cost -->
  <rect x="465" y="102" width="44" height="18" rx="3" fill="#45475a"/>
  <text x="487" y="115" text-anchor="middle" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#cdd6f4">cost</text>
  <!-- | -->
  <text x="514" y="115" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#585b70"> | </text>
  <!-- context-bar -->
  <rect x="527" y="102" width="90" height="18" rx="3" fill="#45475a"/>
  <text x="572" y="115" text-anchor="middle" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#cdd6f4">context-bar</text>
  <!-- + add button -->
  <text x="627" y="115" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#a6e3a1"> + add</text>

  <!-- Widget detail / color picker -->
  <text x="246" y="150" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#585b70">Selected: model</text>
  <text x="246" y="170" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#cdd6f4">Color: default</text>

  <!-- Color swatches row -->
  <rect x="246" y="178" width="14" height="14" rx="2" fill="#f38ba8"/>
  <rect x="264" y="178" width="14" height="14" rx="2" fill="#a6e3a1"/>
  <rect x="282" y="178" width="14" height="14" rx="2" fill="#f9e2af"/>
  <rect x="300" y="178" width="14" height="14" rx="2" fill="#89dceb"/>
  <rect x="318" y="178" width="14" height="14" rx="2" fill="#cba6f7"/>
  <rect x="336" y="178" width="14" height="14" rx="2" fill="#fab387"/>
  <rect x="354" y="178" width="14" height="14" rx="2" fill="#89b4fa"/>
  <rect x="372" y="178" width="14" height="14" rx="2" fill="#cdd6f4" stroke="#585b70" stroke-width="2"/>

  <text x="246" y="212" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#585b70">Keys: a add  d del  m move  x del-line  Esc back</text>

  <!-- Separator -->
  <line x1="20" y1="300" x2="640" y2="300" stroke="#313244" stroke-width="1"/>

  <!-- Preview section label -->
  <text x="20" y="318" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="11" fill="#585b70">Live Preview</text>

  <!-- Simulated preview output — line 1 -->
  <text x="20" y="340" xml:space="preserve" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="13" fill="#cdd6f4"><tspan fill="#cdd6f4">~/projects/my-app</tspan><tspan fill="#585b70" opacity="0.75"> | </tspan><tspan fill="#cdd6f4">main</tspan><tspan fill="#585b70" opacity="0.75"> | </tspan><tspan fill="#cdd6f4">Opus</tspan><tspan fill="#585b70" opacity="0.75"> | </tspan><tspan fill="#cdd6f4">$0.45</tspan><tspan fill="#585b70" opacity="0.75"> | </tspan><tspan fill="#a6e3a1">████░░░░</tspan><tspan fill="#cdd6f4"> 45%</tspan><tspan fill="#585b70" opacity="0.75"> | </tspan><tspan fill="#a6e3a1">⛓️ @ 9:20p</tspan></text>
  <!-- line 2 -->
  <text x="20" y="362" xml:space="preserve" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="13" fill="#cdd6f4"><tspan fill="#cdd6f4">5h ██░░░ 35%</tspan><tspan fill="#585b70" opacity="0.75"> | </tspan><tspan fill="#cdd6f4">7d █░░░░ 20%</tspan><tspan fill="#585b70" opacity="0.75"> | </tspan><tspan fill="#cdd6f4">+$5/$20 █░░░░ 25%</tspan></text>
  <!-- line 3 -->
  <text x="20" y="384" xml:space="preserve" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="13" fill="#cdd6f4"><tspan fill="#cdd6f4">⚖️ 491k tokens saved</tspan><tspan fill="#585b70" opacity="0.75"> | </tspan><tspan fill="#cdd6f4">34% compressed</tspan><tspan fill="#585b70" opacity="0.75"> | </tspan><tspan fill="#cdd6f4">$0.12 saved</tspan><tspan fill="#585b70" opacity="0.75"> | </tspan><tspan fill="#cdd6f4">78% cache hit</tspan></text>

  <!-- Keyboard hints bar -->
  <rect x="0" y="388" width="660" height="12" fill="#181825"/>
  <text x="20" y="398" font-family="JetBrains Mono,Cascadia Code,SF Mono,Menlo,Consolas,Courier New,monospace" font-size="9" fill="#585b70">Ctrl+S save  Ctrl+C quit</text>
</svg>
